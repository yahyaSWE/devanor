services:
  db:
    image: postgres:16-alpine
    container_name: devanor-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: devanor
      POSTGRES_PASSWORD: devanor
      POSTGRES_DB: devanor
    ports:
      - "5432:5432"
    volumes:
      - devanor_pgdata:/var/lib/postgresql/data

volumes:
  devanor_pgdata:
